services:
  postgres:
    image: postgres:17.2-alpine
    container_name: n8n_pulse_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: n8n_pulse
      POSTGRES_USER: n8n_pulse
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U n8n_pulse -d n8n_pulse"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    networks:
      internal:
        aliases: [postgres, n8n_pulse_postgres]

  backend:
    image: mohammedaljer/n8n_pulse:v2.0.0
    container_name: n8n_pulse_app
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-8899}:8001"
    environment:
      APP_ENV: ${APP_ENV:-production}
      DATABASE_URL: postgres://n8n_pulse:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/n8n_pulse
      PORT: "8001"
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required - minimum 32 characters}
      APP_URL: ${APP_URL:-http://localhost:8899}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:8899}
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      COOKIE_SAMESITE: ${COOKIE_SAMESITE:-lax}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN:-}
      TRUST_PROXY: ${TRUST_PROXY:-false}
      LOG_FORMAT: json
      RETENTION_ENABLED: ${RETENTION_ENABLED:-true}
      RETENTION_DAYS: ${RETENTION_DAYS:-90}
      RETENTION_RUN_AT: ${RETENTION_RUN_AT:-03:30}
      RETENTION_TZ: ${RETENTION_TZ:-UTC}
      METRICS_ENABLED: ${METRICS_ENABLED:-true}
      METRICS_MAX_TIME_RANGE_DAYS: ${METRICS_MAX_TIME_RANGE_DAYS:-30}
      METRICS_MAX_DATAPOINTS: ${METRICS_MAX_DATAPOINTS:-1000}
      PULSE_INGEST_USER: ${PULSE_INGEST_USER:-}
      PULSE_INGEST_PASSWORD: ${PULSE_INGEST_PASSWORD:-}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/nodejs/bin/node", "-e", "fetch('http://127.0.0.1:8001/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=64M
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    networks:
      internal:
        aliases: [backend, n8n_pulse_app]

networks:
  internal:
    driver: bridge

volumes:
  postgres_data: