name: Trivy Scan

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - "backend/**"
      - "frontend/**"
      - "Dockerfile"
      - "docker-compose*.yml"
      - ".github/workflows/trivy.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "backend/**"
      - "frontend/**"
      - "Dockerfile"
      - "docker-compose*.yml"
      - ".github/workflows/trivy.yml"
  schedule:
    - cron: "30 6 * * 1"

jobs:
  security:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build unified image
        run: docker build --pull --no-cache -t n8npulse:test .

      - name: Trivy image scan (OS & library & secrets)
        uses: aquasecurity/trivy-action@0.34.1
        with:
          scan-type: "image"
          image-ref: "n8npulse:test"
          format: "table"
          exit-code: "1"
          ignore-unfixed: true
          severity: "CRITICAL,HIGH"
          vuln-type: "os,library"
          scanners: "vuln,secret"

      - name: Trivy config scan (Dockerfile / compose)
        uses: aquasecurity/trivy-action@0.34.1
        with:
          scan-type: "config"
          format: "table"
          exit-code: "1"
          severity: "CRITICAL,HIGH"

      - name: Frontend npm audit (omit dev)
        working-directory: frontend
        run: |
          npm ci
          npm audit --omit=dev

      - name: Backend npm audit (omit dev)
        working-directory: backend
        run: |
          npm ci
          npm audit --omit=dev
