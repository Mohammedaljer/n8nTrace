name: Trivy Scan

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - "backend/**"
      - "frontend/**"
      - ".github/workflows/trivy.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "backend/**"
      - "frontend/**"
      - ".github/workflows/trivy.yml"

jobs:
  security:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build frontend image
        run: docker build --pull --no-cache -t n8npulse-frontend:test ./frontend

      - name: Trivy frontend image (OS & library & secrets)
        uses: aquasecurity/trivy-action@0.34.1
        with:
          scan-type: "image"
          image-ref: "n8npulse-frontend:test"
          format: "table"
          exit-code: "1"
          ignore-unfixed: true
          severity: "CRITICAL,HIGH"
          vuln-type: "os,library"
          scanners: "vuln,secret"

      - name: Frontend npm audit (omit dev)
        working-directory: frontend
        run: |
          npm ci
          npm audit --omit=dev

      - name: Build backend image
        run: docker build --pull --no-cache -t n8npulse-backend:test ./backend

      - name: Debug backend lock + image deps
        run: |
          echo "Commit:" $GITHUB_SHA
          node -e "const fs=require('fs'); const s=fs.readFileSync('backend/package-lock.json','utf8'); console.log('lock has 10.2.3?', s.includes('\"version\": \"10.2.3\"'))"
          docker run --rm --entrypoint /nodejs/bin/node -w /app n8npulse-backend:test -e "console.log('minimatch in image:', require('minimatch/package.json').version)"

      - name: Trivy backend image (OS & library & secrets)
        uses: aquasecurity/trivy-action@0.34.1
        with:
          scan-type: "image"
          image-ref: "n8npulse-backend:test"
          format: "table"
          exit-code: "1"
          ignore-unfixed: true
          severity: "CRITICAL,HIGH"
          vuln-type: "os,library"
          scanners: "vuln,secret"

      - name: Backend npm audit (omit dev)
        working-directory: backend
        run: |
          npm ci
          npm audit --omit=dev
